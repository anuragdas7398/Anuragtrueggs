services:
  - type: web
    name: trueggs-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: MONGO_URL
        fromEnv: MONGO_URL
      - key: DB_NAME
        value: trueggs
      - key: CORS_ORIGINS
        value: "*"
